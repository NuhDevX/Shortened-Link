<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUHWEB | Tools | Pemendek Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="https://nuh-web.vercel.app/aset/icon.jpg" />
    <link rel="stylesheet" href="https://nuh-web.vercel.app/tools/pemendek/style.css">
</style>
</head>
<body class="min-h-screen">
    <div id="stars"></div>

    <!-- REDIRECT LOADING OVERLAY -->
    <div id="redirectOverlay">
        <!-- Floating particles -->
        <div class="redirect-particle" style="width:8px;height:8px;top:20%;left:15%;animation-delay:0s;animation-duration:3.5s"></div>
        <div class="redirect-particle" style="width:5px;height:5px;top:70%;left:80%;animation-delay:1s;animation-duration:4s"></div>
        <div class="redirect-particle" style="width:6px;height:6px;top:30%;left:75%;animation-delay:0.5s;animation-duration:3s"></div>
        <div class="redirect-particle" style="width:4px;height:4px;top:65%;left:20%;animation-delay:2s;animation-duration:5s"></div>
        <div class="redirect-particle" style="width:7px;height:7px;top:80%;left:50%;animation-delay:1.5s;animation-duration:3.8s"></div>

        <!-- Orbit loader -->
        <div class="orbit-container">
            <div class="orbit-ring"></div>
            <div class="orbit-ring"></div>
            <div class="orbit-ring"></div>
            <div class="orbit-core"></div>
        </div>

        <!-- Label -->
        <div class="redirect-label">
            Mengalihkan ke link tujuan
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>

        <!-- Progress bar -->
        <div class="progress-bar-wrap">
            <div class="progress-bar-fill"></div>
        </div>
    </div>

    <a href="https://nuhweb.site/tool" class="back-button">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
    </a>
    
    <div class="flex items-center justify-center min-h-screen p-4 relative z-10">
        <div class="bg-gradient-to-br from-purple-900/40 to-blue-900/40 backdrop-blur-md rounded-2xl shadow-2xl p-8 w-full max-w-md border border-purple-500/30">
            <div class="flex items-center justify-center mb-6 animate-float">
                <div class="bg-gradient-to-br from-purple-600 to-blue-600 p-4 rounded-full shadow-lg shadow-purple-500/50">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path>
                    </svg>
                </div>
            </div>
            
            <h1 class="text-3xl font-bold text-center text-white mb-2">Pemendek Link</h1>
            <p class="text-center text-purple-200 mb-8">Jelajahi internet dengan link yang lebih singkat</p>
            
            <div class="bg-yellow-900/30 border border-yellow-500/50 rounded-lg p-4 mb-6">
                <div class="flex items-start gap-3">
                    <svg class="w-5 h-5 text-yellow-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                    </svg>
                    <p class="text-yellow-200 text-sm">
                        <strong>PENTING:</strong> Link tidak bisa ditimpa!, jadi Pastikan Anda menggunakan nama link yang unik!
                    </p>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="flex items-center gap-2 text-sm font-medium text-purple-200 mb-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        Link yang akan dipendekkan
                    </label>
                    <input
                        type="text"
                        id="originalUrl"
                        placeholder="google.com atau https://example.com"
                        class="w-full px-4 py-3 bg-purple-900/30 border border-purple-500/50 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition text-white placeholder-purple-300/50"
                    />
                </div>

                <div>
                    <label class="flex items-center gap-2 text-sm font-medium text-purple-200 mb-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path>
                        </svg>
                        Nama link custom
                    </label>
                    <div class="flex items-center bg-purple-900/30 border border-purple-500/50 rounded-lg overflow-hidden focus-within:ring-2 focus-within:ring-purple-500">
                        <span class="px-3 py-3 bg-purple-800/50 text-purple-200 text-sm" id="domainPrefix">loading...</span>
                        <input
                            type="text"
                            id="customName"
                            placeholder="nama-link"
                            class="flex-1 px-3 py-3 outline-none bg-transparent text-white placeholder-purple-300/50"
                        />
                    </div>
                </div>

                <div id="errorMsg" class="hidden bg-red-900/50 border border-red-500/50 text-red-200 px-4 py-3 rounded-lg text-sm flex items-start gap-2">
                    <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                    <span id="errorText"></span>
                </div>

                <button
                    id="generateBtn"
                    class="w-full bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 text-white font-semibold py-3 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-purple-500/50 flex items-center justify-center gap-2"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                    Generate
                </button>

                <div id="loadingDiv" class="hidden flex justify-center py-4">
                    <div class="animate-spin rounded-full h-10 w-10 border-4 border-purple-500/30 border-t-purple-500"></div>
                </div>

                <div id="resultDiv" class="hidden mt-6 p-4 bg-green-900/30 border border-green-500/50 rounded-lg animate-fadeIn">
                    <p class="flex items-center gap-2 text-sm text-green-200 mb-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        Link pendek Anda:
                    </p>
                    <div class="flex items-center gap-2">
                        <div class="flex-1 bg-purple-900/50 px-4 py-3 rounded-lg border border-purple-500/30 break-all">
                            <a id="shortenedLink" href="#" target="_blank" rel="noopener noreferrer" class="text-purple-300 hover:text-purple-100 font-medium"></a>
                        </div>
                        <button
                            id="copyBtn"
                            class="bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 text-white p-3 rounded-lg transition shadow-lg"
                            title="Copy link"
                        >
                            <svg id="copyIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                            </svg>
                            <svg id="checkIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                            </svg>
                        </button>
                    </div>
                    <button
                        id="resetBtn"
                        class="mt-4 w-full bg-purple-800/50 hover:bg-purple-700/50 text-purple-200 py-2 rounded-lg transition text-sm border border-purple-500/30 flex items-center justify-center gap-2"
                    >
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                        </svg>
                        Buat Link Baru
                    </button>
                </div>
            </div>
        </div>
    </div>

<script type="module" src="https://nuh-web.vercel.app/tools/pemendek/script.js"></script>
</body>
</html>
